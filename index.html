<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUIS IPS — Geografi & Sosial</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --card: #1a2235;
    --accent: #38bdf8;
    --accent2: #f59e0b;
    --accent3: #a78bfa;
    --correct: #10b981;
    --wrong: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --border: rgba(56,189,248,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BG mesh ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(56,189,248,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 80%, rgba(167,139,250,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 50% 50%, rgba(245,158,11,0.04) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 760px; margin: 0 auto; padding: 24px 20px 80px; }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 48px 0 40px;
    animation: fadeDown .6s ease both;
  }
  .badge {
    display: inline-block;
    background: rgba(56,189,248,0.12);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 16px;
    border-radius: 100px;
    margin-bottom: 20px;
  }
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(36px, 7vw, 64px);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -1px;
  }
  h1 span { color: var(--accent); }
  .sub { color: var(--muted); font-size: 15px; margin-top: 12px; font-weight: 300; }

  /* ── SCORE BAR ── */
  .scorebar {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 24px;
    margin-bottom: 32px;
    gap: 16px;
    animation: fadeUp .5s .2s ease both;
  }
  .score-item { text-align: center; }
  .score-num {
    font-family: 'Syne', sans-serif;
    font-size: 28px; font-weight: 800;
  }
  .score-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
  .divider { width: 1px; height: 40px; background: var(--border); }
  .progress-wrap { flex: 1; }
  .progress-track {
    height: 6px; background: rgba(255,255,255,0.07); border-radius: 99px; overflow: hidden;
  }
  .progress-bar {
    height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius: 99px; transition: width .4s ease;
  }
  .progress-label { font-size: 12px; color: var(--muted); margin-top: 6px; }

  /* ── CATEGORY FILTER ── */
  .cats {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 24px;
    animation: fadeUp .5s .3s ease both;
  }
  .cat-btn {
    padding: 7px 16px; border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent; color: var(--muted);
    font-size: 13px; font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: all .2s;
  }
  .cat-btn:hover { border-color: var(--accent); color: var(--accent); }
  .cat-btn.active { background: var(--accent); border-color: var(--accent); color: #0a0e1a; font-weight: 500; }

  /* ── QUESTION CARD ── */
  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 16px;
    animation: fadeUp .4s ease both;
    position: relative;
    overflow: hidden;
  }
  .q-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    opacity: 0; transition: opacity .3s;
  }
  .q-card.answered::before { opacity: 1; }

  .q-num {
    font-family: 'Syne', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--accent); margin-bottom: 12px;
  }
  .q-text {
    font-size: 16px; font-weight: 400; line-height: 1.6;
    margin-bottom: 24px; color: var(--text);
  }

  /* options */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 14px 18px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    cursor: pointer;
    transition: all .2s ease;
    background: rgba(255,255,255,0.02);
    position: relative;
    overflow: hidden;
  }
  .opt::before {
    content: ''; position: absolute; inset: 0;
    background: var(--accent); opacity: 0; transition: opacity .2s;
  }
  .opt:hover:not(.locked)::before { opacity: 0.05; }
  .opt:hover:not(.locked) { border-color: rgba(56,189,248,0.3); }

  .opt-letter {
    width: 28px; height: 28px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 12px; font-weight: 700;
    flex-shrink: 0; transition: all .2s;
    position: relative; z-index: 1;
  }
  .opt-text { font-size: 14px; line-height: 1.5; padding-top: 4px; position: relative; z-index: 1; }

  .opt.correct {
    border-color: var(--correct);
    background: rgba(16,185,129,0.1);
  }
  .opt.correct .opt-letter { background: var(--correct); border-color: var(--correct); color: #fff; }

  .opt.wrong {
    border-color: var(--wrong);
    background: rgba(239,68,68,0.1);
  }
  .opt.wrong .opt-letter { background: var(--wrong); border-color: var(--wrong); color: #fff; }

  .opt.locked { cursor: default; }

  /* explanation */
  .explain {
    margin-top: 16px;
    padding: 14px 18px;
    border-radius: 12px;
    border-left: 3px solid var(--correct);
    background: rgba(16,185,129,0.07);
    font-size: 13px; color: var(--text); line-height: 1.5;
    animation: fadeUp .3s ease both;
  }
  .explain.wrong-explain { border-color: var(--wrong); background: rgba(239,68,68,0.07); }
  .explain strong { color: var(--correct); }
  .explain.wrong-explain strong { color: var(--wrong); }

  /* ── RESULT SCREEN ── */
  .result-screen {
    text-align: center;
    padding: 60px 32px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    animation: fadeUp .5s ease both;
  }
  .result-emoji { font-size: 64px; margin-bottom: 20px; display: block; }
  .result-score {
    font-family: 'Syne', sans-serif;
    font-size: 72px; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .result-label { font-size: 20px; font-weight: 300; color: var(--muted); margin-bottom: 8px; }
  .result-msg { font-size: 16px; margin: 20px 0 36px; line-height: 1.6; color: var(--text); }
  .result-breakdown {
    display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 36px;
  }
  .rb-item {
    padding: 16px; background: rgba(255,255,255,0.04); border-radius: 14px;
  }
  .rb-num { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; }
  .rb-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

  /* ── BUTTONS ── */
  .btn {
    padding: 14px 32px; border-radius: 12px;
    font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500;
    cursor: pointer; transition: all .2s; border: none;
  }
  .btn-primary {
    background: var(--accent); color: #0a0e1a;
  }
  .btn-primary:hover { background: #7dd3fc; transform: translateY(-1px); }
  .btn-outline {
    background: transparent; color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

  .nav-row {
    display: flex; gap: 12px; justify-content: flex-end; margin-top: 12px;
  }

  /* ── START SCREEN ── */
  .start-screen {
    text-align: center;
    padding: 48px 32px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    animation: fadeUp .5s ease both;
  }
  .start-screen p { color: var(--muted); font-size: 15px; margin-bottom: 32px; line-height: 1.7; }
  .topics {
    display: flex; flex-wrap: wrap; gap: 10px;
    justify-content: center; margin-bottom: 36px;
  }
  .topic-chip {
    padding: 6px 14px; border-radius: 100px;
    font-size: 12px; font-weight: 500;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }
  .pop { animation: pop .3s ease; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px);
    padding: 12px 24px; border-radius: 12px;
    font-size: 14px; font-weight: 500;
    transition: transform .3s ease, opacity .3s ease;
    opacity: 0; z-index: 100; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast.correct-toast { background: var(--correct); color: #fff; }
  .toast.wrong-toast { background: var(--wrong); color: #fff; }
</style>
</head>

  { id:47, cat:"Kebutuhan", text:"Kebutuhan sekunder adalah.... (1) rumah mewah (2) HP (3) pakaian (4) sepeda (5) makanan", opts:["(1), (2)","(2), (3)","(1), (4)","(2), (4)","(3), (5)"], ans:3 },
  { id:48, cat:"Kebutuhan", text:"Hal yang perlu diperhatikan dalam skala prioritas adalah....", opts:["Warna barang","Jumlah teman","Masa depan dan kebutuhan mendesak","Harga pasar","Lokasi rumah"], ans:2 },
  { id:49, cat:"Ekonomi", text:"Kegiatan pertambangan termasuk bidang....", opts:["Jasa","Agraris","Perdagangan","Industri","Ekstraktif"], ans:4 },
  { id:50, cat:"Ekonomi", text:"Orang yang menjual rumah orang lain dan mendapat selisih harga adalah....", opts:["Agen","Makelar","Produsen","Distributor","Konsumen"], ans:1 },
  { id:51, cat:"Ekonomi", text:"Salon dan bengkel termasuk usaha....", opts:["Produksi","Jasa","Distribusi","Pertanian","Konsumsi"], ans:1 },
  { id:52, cat:"Ekonomi", text:"Proses produksi singkong goreng termasuk produksi....", opts:["Pendek","Panjang","Kompleks","Terus-menerus","Tidak langsung"], ans:0 },
  { id:53, cat:"Ekonomi", text:"Contoh kegiatan produksi adalah.... (1) layanan rambut (2) mengolah kayu (3) mencetak koran (4) makan roti (5) membuat kue", opts:["(1), (2), (4)","(1), (3), (4)","(2), (3), (5)","(2), (4), (6)","(3), (4), (5)"], ans:2 },
  { id:54, cat:"Konflik Sosial", text:"Tawuran antar sekolah termasuk konflik....", opts:["Vertikal","Horizontal","Politik","Ekonomi","Individu"], ans:1 },
  { id:55, cat:"Konflik Sosial", text:"Konflik yang berdampak positif disebut konflik....", opts:["Konstruktif","Destruktif","Negatif","Pasif","Netral"], ans:0 },
  { id:56, cat:"Konflik Sosial", text:"Mengurangi tuntutan dalam penyelesaian konflik disebut....", opts:["Toleransi","Kompromi","Arbitrasi","Mediasi","Konfrontasi"], ans:1 },
  { id:57, cat:"Konflik Sosial", text:"Penyimpangan karena tidak ada norma disebut teori....", opts:["Labeling","Konflik","Anomie","Kontrol sosial","Interaksi"], ans:2 },
  { id:58, cat:"Keberagaman", text:"Perbedaan tarian daerah menunjukkan pluralitas....", opts:["Agama","Ras","Budaya","Ekonomi","Politik"], ans:2 },
  { id:59, cat:"Keberagaman", text:"Suku Sasak berasal dari....", opts:["Nusa Tenggara Barat","Jawa Timur","Sulawesi","Kalimantan","Papua"], ans:0 },
  { id:60, cat:"Keberagaman", text:"Faktor keberagaman budaya, KECUALI....", opts:["Perbedaan individu","Agama","Adat istiadat","Lokasi","Perubahan sosial"], ans:0 },
];

const catColors = {
  "Peta & Atlas": "#38bdf8",
  "Geografi Ekonomi": "#34d399",
  "Geografi Kota": "#a78bfa",
  "Interaksi Sosial": "#f59e0b",
  "Kependudukan": "#fb7185",
  "Sosialisasi": "#60a5fa",
  "Nilai Sosial": "#c084fc",
  "Mobilitas Sosial": "#fbbf24",
  "Ekonomi": "#2dd4bf",
  "Kebutuhan": "#f97316",
  "Konflik Sosial": "#f43f5e",
  "Keberagaman": "#84cc16",
};

const letters = ['A','B','C','D','E'];

let state = {
  mode: 'start', // start | quiz | result
  filter: 'Semua',
  questions: [],
  current: 0,
  answers: {}, // id -> chosen index
  showAll: false,
};

const cats = ['Semua', ...Object.keys(catColors)];

function getFiltered() {
  if (state.filter === 'Semua') return allQuestions;
  return allQuestions.filter(q => q.cat === state.filter);
}

function render() {
  const app = document.getElementById('app');
  if (state.mode === 'start') { app.innerHTML = renderStart(); return; }
  if (state.mode === 'result') { app.innerHTML = renderResult(); return; }

  const q = state.questions;
  const total = q.length;
  const answered = Object.keys(state.answers).length;
  const correct = q.filter(qq => state.answers[qq.id] === qq.ans).length;

  let html = `
  <div class="scorebar">
    <div class="score-item">
      <div class="score-num" style="color:var(--correct)">${correct}</div>
      <div class="score-label">Benar</div>
    </div>
    <div class="divider"></div>
    <div class="score-item">
      <div class="score-num" style="color:var(--wrong)">${answered - correct}</div>
      <div class="score-label">Salah</div>
    </div>
    <div class="divider"></div>
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-bar" style="width:${total>0?Math.round(answered/total*100):0}%"></div></div>
      <div class="progress-label">${answered} / ${total} terjawab</div>
    </div>
  </div>`;

  // Show current or all questions
  const toShow = state.showAll ? q : [q[state.current]];
  
  toShow.forEach((qq, i) => {
    const chosen = state.answers[qq.id];
    const answered2 = chosen !== undefined;
    const isCorrect = chosen === qq.ans;

    html += `<div class="q-card ${answered2?'answered':''}" id="qcard-${qq.id}">
      <div class="q-num">Soal ${qq.id} &nbsp;·&nbsp; <span style="color:${catColors[qq.cat]}">${qq.cat}</span></div>
      <div class="q-text">${qq.text}</div>
      <div class="options">`;

    qq.opts.forEach((opt, idx) => {
      let cls = '';
      if (answered2) {
        if (idx === qq.ans) cls = 'correct locked';
        else if (idx === chosen && chosen !== qq.ans) cls = 'wrong locked';
        else cls = 'locked';
      }
      html += `<div class="opt ${cls}" onclick="choose(${qq.id},${idx})">
        <div class="opt-letter">${letters[idx]}</div>
        <div class="opt-text">${opt}</div>
      </div>`;
    });

    html += `</div>`;

    if (answered2) {
      if (isCorrect) {
        html += `<div class="explain"><strong>✓ Benar!</strong> Jawaban yang tepat adalah <strong>${letters[qq.ans]}. ${qq.opts[qq.ans]}</strong>.</div>`;
      } else {
        html += `<div class="explain wrong-explain"><strong>✗ Kurang tepat.</strong> Jawaban yang benar adalah <strong>${letters[qq.ans]}. ${qq.opts[qq.ans]}</strong>.</div>`;
      }
    }

    html += `</div>`;
  });

  if (!state.showAll) {
    html += `<div class="nav-row">
      ${state.current > 0 ? `<button class="btn btn-outline" onclick="prev()">← Sebelumnya</button>` : ''}
      ${state.current < q.length-1 
        ? `<button class="btn btn-primary" onclick="next()">Selanjutnya →</button>` 
        : `<button class="btn btn-primary" onclick="finish()">Selesai 🎉</button>`}
    </div>
    <div style="text-align:center;margin-top:16px">
      <button class="btn btn-outline" style="font-size:13px;padding:8px 20px" onclick="toggleAll()">📋 Lihat Semua Soal</button>
    </div>`;
  } else {
    html += `<div style="text-align:center;margin-top:16px;display:flex;gap:12px;justify-content:center">
      <button class="btn btn-outline" onclick="toggleAll()">🔢 Mode Satu per Satu</button>
      ${answered===total?`<button class="btn btn-primary" onclick="finish()">Selesai 🎉</button>`:''}
    </div>`;
  }

  app.innerHTML = html;
}

function renderStart() {
  const topicChips = Object.entries(catColors).map(([cat, color]) =>
    `<span class="topic-chip" style="background:${color}20;color:${color};border:1px solid ${color}40">${cat}</span>`
  ).join('');

  return `<div class="start-screen">
    <div style="font-size:48px;margin-bottom:16px">🗺️</div>
    <h2 style="font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:16px">Siap Belajar?</h2>
    <p>60 soal pilihan ganda mencakup materi Geografi, Sosiologi, dan Ekonomi. Pilih kategori atau kerjakan semua!</p>
    <div class="topics">${topicChips}</div>
    <div class="cats" style="justify-content:center;margin-bottom:28px">
      ${cats.map(c=>`<button class="cat-btn ${state.filter===c?'active':''}" onclick="setFilter('${c}')">${c}</button>`).join('')}
    </div>
    <div style="margin-bottom:8px;color:var(--muted);font-size:14px">${getFiltered().length} soal dipilih</div>
    <button class="btn btn-primary" style="font-size:16px;padding:16px 48px" onclick="startQuiz()">Mulai Kuis →</button>
  </div>`;
}

function renderResult() {
  const q = state.questions;
  const total = q.length;
  const correct = q.filter(qq => state.answers[qq.id] === qq.ans).length;
  const wrong = total - correct;
  const pct = Math.round(correct / total * 100);
  let emoji = pct>=90?'🏆':pct>=70?'😊':pct>=50?'📖':'💪';
  let msg = pct>=90?'Luar biasa! Kamu sangat menguasai materi ini!':
            pct>=70?'Bagus! Masih ada ruang untuk berkembang.':
            pct>=50?'Lumayan! Pelajari lagi bagian yang belum dipahami.':
            'Jangan menyerah! Baca ulang materi dan coba lagi.';

  // breakdown by category
  const catBreak = {};
  q.forEach(qq => {
    if (!catBreak[qq.cat]) catBreak[qq.cat] = {total:0,correct:0};
    catBreak[qq.cat].total++;
    if (state.answers[qq.id] === qq.ans) catBreak[qq.cat].correct++;
  });

  let catHtml = Object.entries(catBreak).map(([cat,[d]]) => {
    const entry = catBreak[cat];
    const p = Math.round(entry.correct/entry.total*100);
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
      <span style="font-size:13px;color:${catColors[cat]}">${cat}</span>
      <span style="font-size:13px;font-family:'Syne',sans-serif;font-weight:700">${entry.correct}/${entry.total} <span style="color:var(--muted);font-size:11px">(${p}%)</span></span>
    </div>`;
  }).join('');

  return `<div class="result-screen">
    <span class="result-emoji">${emoji}</span>
    <div class="result-label">Nilaimu</div>
    <div class="result-score">${pct}%</div>
    <div class="result-msg">${msg}</div>
    <div class="result-breakdown">
      <div class="rb-item"><div class="rb-num" style="color:var(--correct)">${correct}</div><div class="rb-lbl">Benar</div></div>
      <div class="rb-item"><div class="rb-num" style="color:var(--wrong)">${wrong}</div><div class="rb-lbl">Salah</div></div>
      <div class="rb-item"><div class="rb-num">${total}</div><div class="rb-lbl">Total Soal</div></div>
    </div>
    <div style="margin-bottom:28px;text-align:left">${catHtml}</div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-outline" onclick="reviewAnswers()">📋 Review Jawaban</button>
      <button class="btn btn-primary" onclick="resetQuiz()">🔄 Ulangi Kuis</button>
    </div>
  </div>`;
}

function setFilter(cat) {
  state.filter = cat;
  render();
}

function startQuiz() {
  state.questions = getFiltered();
  state.current = 0;
  state.answers = {};
  state.showAll = false;
  state.mode = 'quiz';
  render();
}

function choose(id, idx) {
  if (state.answers[id] !== undefined) return;
  state.answers[id] = idx;
  const q = state.questions.find(q => q.id === id);
  const correct = idx === q.ans;
  showToast(correct ? '✓ Benar!' : '✗ Kurang tepat', correct);
  render();
}

function next() {
  if (state.current < state.questions.length - 1) {
    state.current++;
    render();
    window.scrollTo({top:0,behavior:'smooth'});
  }
}

function prev() {
  if (state.current > 0) {
    state.current--;
    render();
    window.scrollTo({top:0,behavior:'smooth'});
  }
}

function finish() {
  state.mode = 'result';
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function toggleAll() {
  state.showAll = !state.showAll;
  render();
}

function reviewAnswers() {
  state.mode = 'quiz';
  state.showAll = true;
  state.current = 0;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function resetQuiz() {
  state.mode = 'start';
  state.answers = {};
  state.current = 0;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function showToast(msg, correct) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${correct?'correct-toast':'wrong-toast'} show`;
  setTimeout(()=>{ t.className = 'toast'; }, 2000);
}

render();
</script>
</body>
</html>
